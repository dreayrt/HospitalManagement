<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Từ Chối Truy Cập - 403 Forbidden</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a; /* Slate 900 */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #ef4444; /* Red 500 */
            --accent-glow: rgba(239, 68, 68, 0.5);
            --primary: #3b82f6; /* Blue 500 */
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Particles */
        .bg-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }

        /* Container */
        .error-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 3.5rem 2rem;
            background: rgba(30, 41, 59, 0.6); /* Slate 800 */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.02);
            max-width: 550px;
            width: 90%;
            animation: fadeInDrop 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @keyframes fadeInDrop {
            0% { opacity: 0; transform: translateY(-30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Lock Animation */
        .lock-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 2rem;
        }

        .lock-icon {
            font-size: 5rem;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent-glow);
            animation: pulseLock 2s infinite ease-in-out;
            display: inline-block;
        }

        .lock-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border: 2px dashed var(--accent);
            border-radius: 50%;
            animation: rotateCircle 10s infinite linear;
            opacity: 0.5;
        }
        
        .lock-circle-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130%;
            height: 130%;
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 50%;
            animation: pulseCircle 2s infinite ease-out;
        }

        @keyframes pulseLock {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); text-shadow: 0 0 50px var(--accent); }
            100% { transform: scale(1); }
        }

        @keyframes rotateCircle {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        
        @keyframes pulseCircle {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        /* 403 Text */
        .error-code {
            font-size: 6.5rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
            position: relative;
        }

        .error-code::after {
            content: '403';
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            color: transparent;
            background: none;
            text-shadow: 2px 2px 0px rgba(239, 68, 68, 0.4), -2px -2px 0px rgba(59, 130, 246, 0.3);
            z-index: -1;
            animation: glitch 3s infinite alternate;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .error-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-main);
            letter-spacing: 0.5px;
        }

        .error-desc {
            font-size: 1.05rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* Button */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2.2rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, var(--primary) 0%, #2563eb 100%);
            border: none;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-back::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(59, 130, 246, 0.4);
            color: white;
        }

        .btn-back:hover::before {
            left: 100%;
        }

        .btn-back i {
            transition: transform 0.3s ease;
        }

        .btn-back:hover i {
            transform: translateX(-4px);
        }
        
        .home-link {
            color: var(--text-muted);
            font-size: 0.95rem;
            text-decoration: none;
            transition: color 0.3s ease;
            display: inline-block;
        }
        
        .home-link:hover {
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <!-- Animated Particles -->
    <div class="bg-particles" id="particles"></div>

    <!-- Main Container -->
    <div class="error-container">
        <!-- Animated Lock -->
        <div class="lock-wrapper">
            <div class="lock-circle-inner"></div>
            <div class="lock-circle"></div>
            <i class="bi bi-shield-lock-fill lock-icon"></i>
        </div>

        <div class="error-code">403</div>
        <h1 class="error-title">Truy Cập Bị Từ Chối</h1>
        <p class="error-desc">
            Xin lỗi, bạn không có quyền truy cập vào trang này.<br> 
            Có thể bạn đang cố gắng truy cập vào khu vực không dành cho vai trò của mình.
        </p>

        <a href="javascript:history.back()" class="btn-back">
            <i class="bi bi-arrow-left"></i> Quay lại trang trước
        </a>
        
        <div class="mt-4 pt-2">
            <a href="/" class="home-link">
                <i class="bi bi-house-door me-1"></i> Về Trang chủ
            </a>
        </div>
    </div>

    <!-- Script to generate particles -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 25; // Number of floating particles

            for (let i = 0; i < particleCount; i++) {
                let particle = document.createElement('div');
                particle.classList.add('particle');
                
                // Random properties
                let size = Math.random() * 50 + 15; // 15px to 65px
                let left = Math.random() * 100; // 0% to 100%
                let duration = Math.random() * 12 + 8; // 8s to 20s
                let delay = Math.random() * 15; // 0s to 15s
                let opacity = Math.random() * 0.15 + 0.02; // 0.02 to 0.17

                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${left}%`;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${delay}s`;
                particle.style.opacity = opacity;

                particlesContainer.appendChild(particle);
            }
        });
    </script>
</body>
</html>
