<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Trình Làm Việc Cá Nhân</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #005EB8;
            --brand-secondary: #00A499;
            --brand-tertiary: #F0F4F8;
            --brand-neutral: #4E5969;
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        body {
            background-color: var(--brand-tertiary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--brand-neutral);
            font-size: 20px;
        }

        .dashboard-card {
            background: #fff;
            border-radius: var(--radius-lg);
            border: 0.5px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 15px 35px -5px rgba(0, 94, 184, 0.15);
        }

        .dash-header {
            background: linear-gradient(135deg, var(--brand-primary) 0%, var(--brand-secondary) 100%);
            padding: 22px 28px;
            color: white;
            border-bottom: 4px solid var(--brand-secondary);
        }

        .dash-header h1 {
            font-size: 30px;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .welcome-quote {
            margin: 12px 0 0 0;
            font-size: 17px;
            font-weight: 400;
            opacity: 0.95;
            font-style: italic;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            color: rgba(255, 255, 255, 0.9);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: var(--brand-primary);
        }

        thead th {
            padding: 16px 20px;
            font-weight: 600;
            font-size: 16px;
            text-transform: uppercase;
            color: #ffffff;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
        }

        tbody tr {
            border-bottom: 1px solid #f1f5f9;
            transition: all 0.3s ease;
        }

        tbody tr:hover {
            background: rgba(0, 94, 184, 0.03);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 94, 184, 0.1);
            position: relative;
            z-index: 1;
        }

        tbody td {
            padding: 16px 20px;
            color: #1e293b;
            vertical-align: middle;
        }

        .badge-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 50rem;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .badge-available {
            background: rgba(34, 197, 94, 0.15);
            color: #166534;
        }

        .badge-unavailable {
            background: rgba(239, 68, 68, 0.15);
            color: #991b1b;
        }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: #64748b;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: #cbd5e1;
        }
    </style>
</head>

<body>
    <div class="container-fluid px-5 py-4">
        <div class="dashboard-card">
            <div class="dash-header">
                <div>
                    <h1><i class="fas fa-calendar-alt"></i> Lịch Trình Làm Việc Cá Nhân</h1>
                    <p class="welcome-quote">
                        <i class="fas fa-quote-left" style="opacity: 0.5; margin-right: 8px; font-size: 14px;"></i>
                        Xin chào Bác sĩ! Chúc Bác sĩ một ngày làm việc tràn đầy năng lượng, mang lại nhiều hy vọng và nụ cười cho bệnh nhân.
                        <i class="fas fa-quote-right" style="opacity: 0.5; margin-left: 8px; font-size: 14px;"></i>
                    </p>
                </div>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Ngày Làm Việc</th>
                            <th>Giờ Bắt Đầu</th>
                            <th>Giờ Kết Thúc</th>
                            <th>Trạng Thái Ca</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="schedule : ${personalSchedules}">
                            <td th:text="${schedule.workDate}">2026-05-16</td>
                            <td th:text="${schedule.startTime}">08:00</td>
                            <td th:text="${schedule.endTime}">17:00</td>
                            <td>
                                <span th:if="${schedule.status != null and schedule.status.name() == 'AVAILABLE'}"
                                    class="badge-status badge-available">
                                    <i class="bi bi-check-circle-fill"></i> Sẵn sàng
                                </span>
                                <span th:if="${schedule.status != null and schedule.status.name() == 'UNAVAILABLE'}"
                                    class="badge-status badge-unavailable">
                                    <i class="bi bi-x-circle-fill"></i> Bận/Nghỉ
                                </span>
                            </td>
                        </tr>
                        <tr th:if="${personalSchedules == null or #lists.isEmpty(personalSchedules)}">
                            <td colspan="4">
                                <div class="empty-state">
                                    <i class="far fa-calendar-times"></i>
                                    <p>Không có lịch trình nào được tìm thấy.</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
