<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Cá Nhân - MediCore Health</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f7ff 0%, #c9e3fa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(13, 110, 253, 0.08);
            width: 100%;
            max-width: 600px;
            padding: 40px;
            position: relative;
            transform: translateY(20px);
            opacity: 0;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .card-header-custom {
            text-align: center;
            margin-bottom: 40px;
        }

        .card-header-custom h2 {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .card-header-custom p {
            color: #64748b;
            font-size: 15px;
        }

        /* Avatar Section */
        .avatar-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 30px;
            animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            animation-delay: 0.2s;
            opacity: 0;
            transform: scale(0.8);
        }

        @keyframes scaleIn {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffffff;
            box-shadow: 0 10px 25px rgba(13, 110, 253, 0.15);
            transition: all 0.3s ease;
        }

        .avatar-upload-overlay {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #0D6EFD;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3);
            transition: transform 0.3s ease, background 0.3s ease;
            z-index: 10;
        }

        .avatar-upload-overlay:hover {
            transform: scale(1.1) rotate(10deg);
            background: #0b5ed7;
        }

        .file-input {
            display: none;
        }

        /* Form Inputs */
        .custom-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
            padding-left: 4px;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .custom-input {
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            padding: 14px 45px 14px 16px;
            height: auto;
            font-size: 15px;
            color: #1e293b;
        }

        .custom-input:focus {
            border-color: #0D6EFD;
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
            background: #ffffff;
            outline: none;
        }

        .custom-input:disabled {
            background-color: #f8fafc;
            color: #64748b;
            cursor: not-allowed;
            border-color: #e2e8f0;
        }

        .form-control-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: color 0.3s ease;
            z-index: 5;
            font-size: 1.2rem;
            pointer-events: none;
        }

        .custom-input:focus ~ .form-control-icon {
            color: #0D6EFD;
        }

        .input-group-custom {
            position: relative;
            margin-bottom: 24px;
            animation: slideIn 0.5s ease forwards;
            opacity: 0;
            transform: translateX(-15px);
        }

        /* Staggered animation for inputs */
        .input-group-custom:nth-child(1) { animation-delay: 0.3s; }
        .input-group-custom:nth-child(2) { animation-delay: 0.4s; }
        .input-group-custom:nth-child(3) { animation-delay: 0.5s; }
        .input-group-custom:nth-child(4) { animation-delay: 0.6s; }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Action Buttons */
        .action-btns {
            display: flex;
            gap: 15px;
            margin-top: 35px;
            animation: slideIn 0.5s ease forwards;
            animation-delay: 0.7s;
            opacity: 0;
        }

        .btn-custom {
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-save {
            background: #0D6EFD;
            color: white;
            border: none;
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.25);
        }

        .btn-save:hover {
            background: #0b5ed7;
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(13, 110, 253, 0.35);
        }

        .btn-cancel {
            background: #f1f5f9;
            color: #475569;
            border: none;
        }

        .btn-cancel:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        .back-link {
            position: absolute;
            top: 25px;
            left: 25px;
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s ease, transform 0.3s ease;
            font-size: 15px;
        }

        .back-link:hover {
            color: #0D6EFD;
            transform: translateX(-3px);
        }

        .password-group {
            display: none;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }
        .password-group.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

    </style>
</head>
<body>

    <div class="profile-card">
        <a href="javascript:history.back()" class="back-link">
            <i class="bi bi-arrow-left"></i> Quay lại
        </a>

        <div class="card-header-custom mt-3">
            <h2>Hồ Sơ Cá Nhân</h2>
            <p>Quản lý thông tin và hình ảnh đại diện của bạn</p>
        </div>

        <div class="avatar-wrapper">
            <!-- Default Avatar, user can update -->
            <img src="https://ui-avatars.com/api/?name=Admin+System&background=0D6EFD&color=fff&size=200" alt="Avatar" class="avatar-img" id="avatarPreview">
            <label for="avatarUpload" class="avatar-upload-overlay" title="Cập nhật ảnh đại diện">
                <i class="bi bi-camera-fill"></i>
            </label>
            <input type="file" id="avatarUpload" class="file-input" accept="image/*">
        </div>

        <form action="#" method="POST" id="profileForm">
            <div class="input-group-custom">
                <label for="employeeName" class="custom-label">Tên nhân viên</label>
                <div class="input-wrapper">
                    <input type="text" class="form-control custom-input" id="employeeName" placeholder="Nhập tên nhân viên" required disabled>
                    <i class="bi bi-person-fill form-control-icon"></i>
                </div>
            </div>

            <div class="input-group-custom">
                <label for="position" class="custom-label">Chức vụ</label>
                <div class="input-wrapper">
                    <input type="text" class="form-control custom-input" id="position" placeholder="Nhập chức vụ" required disabled>
                    <i class="bi bi-briefcase-fill form-control-icon"></i>
                </div>
            </div>

            <div class="input-group-custom">
                <label for="gmail" class="custom-label">Địa chỉ Gmail</label>
                <div class="input-wrapper">
                    <input type="email" class="form-control custom-input" id="gmail" placeholder="Nhập địa chỉ email" required disabled>
                    <i class="bi bi-envelope-fill form-control-icon"></i>
                </div>
            </div>

            <div class="input-group-custom">
                <label for="phone" class="custom-label">Số điện thoại</label>
                <div class="input-wrapper">
                    <input type="tel" class="form-control custom-input" id="phone" placeholder="Nhập số điện thoại" required disabled>
                    <i class="bi bi-telephone-fill form-control-icon"></i>
                </div>
            </div>

            <!-- Password fields (hidden by default) -->
            <div class="password-group" id="passwordGroup">
                <div class="input-group-custom">
                    <label for="currentPassword" class="custom-label">Mật khẩu hiện tại</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-control custom-input" id="currentPassword" placeholder="Nhập mật khẩu hiện tại" disabled>
                        <i class="bi bi-lock-fill form-control-icon"></i>
                    </div>
                </div>

                <div class="input-group-custom">
                    <label for="newPassword" class="custom-label">Mật khẩu mới</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-control custom-input" id="newPassword" placeholder="Nhập mật khẩu mới" disabled>
                        <i class="bi bi-shield-lock-fill form-control-icon"></i>
                    </div>
                </div>
            </div>

            <!-- Nút Cập nhật (Mặc định hiển thị) -->
            <div class="action-btns" id="initialActions">
                <button type="button" class="btn-custom btn-save" id="btnUpdate" style="width: 100%;">
                    <i class="bi bi-pencil-square"></i> Cập nhật
                </button>
            </div>

            <!-- Nút Hủy và Lưu (Ẩn mặc định) -->
            <div class="action-btns" id="editActions" style="display: none;">
                <button type="button" class="btn-custom btn-cancel" id="btnCancelEdit">
                    <i class="bi bi-x-lg"></i> Hủy
                </button>
                <button type="submit" class="btn-custom btn-save" id="btnSaveEdit">
                    <i class="bi bi-check-lg"></i> Lưu Cập Nhật
                </button>
            </div>
        </form>
    </div>


</body>
<!-- Script to handle avatar upload preview -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const avatarUpload = document.getElementById('avatarUpload');
        const avatarPreview = document.getElementById('avatarPreview');

        avatarUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    // Smooth transition for image change
                    avatarPreview.style.opacity = '0';
                    setTimeout(() => {
                        avatarPreview.src = event.target.result;
                        avatarPreview.style.opacity = '1';
                    }, 200);
                }
                reader.readAsDataURL(file);
            }
        });

        // Prevent default form submission to show UI is just for frontend
        const profileForm = document.getElementById('profileForm');
        const btnUpdate = document.getElementById('btnUpdate');
        const btnCancelEdit = document.getElementById('btnCancelEdit');
        const initialActions = document.getElementById('initialActions');
        const editActions = document.getElementById('editActions');
        const passwordGroup = document.getElementById('passwordGroup');
        const currentPasswordInput = document.getElementById('currentPassword');
        const newPasswordInput = document.getElementById('newPassword');

        // Các trường input cần unlock
        const inputsToUnlock = ['employeeName', 'position', 'gmail', 'phone'];

        // Xử lý sự kiện click Cập nhật
        btnUpdate.addEventListener('click', function() {
            initialActions.style.display = 'none';
            editActions.style.display = 'flex';

            // Hiển thị field mật khẩu với animation
            passwordGroup.classList.add('show');
            currentPasswordInput.removeAttribute('disabled');
            newPasswordInput.removeAttribute('disabled');

            // Bỏ disabled các trường thông tin
            inputsToUnlock.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.removeAttribute('disabled');
            });
        });

        // Xử lý sự kiện click Hủy
        btnCancelEdit.addEventListener('click', function() {
            editActions.style.display = 'none';
            initialActions.style.display = 'flex';

            // Ẩn field mật khẩu
            passwordGroup.classList.remove('show');
            currentPasswordInput.setAttribute('disabled', 'true');
            currentPasswordInput.value = '';
            newPasswordInput.setAttribute('disabled', 'true');
            newPasswordInput.value = '';

            // Disable lại các trường thông tin
            inputsToUnlock.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.setAttribute('disabled', 'true');
            });
        });

        profileForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            // User's backend logic will go here

            try{
                const newPassword=document.querySelector("#newPassword").value;
                const response = await fetch('/api/profile/changePassword',{
                    method: "PATCH",
                    headers:{
                        "Content-Type":"application/json",
                        "Authorization": "Bearer "+localStorage.getItem("accessToken")
                    },
                    body:JSON.stringify({
                        newPassword: newPassword
                    })
                })
                if (!response.ok){
                    throw new Error("Update password failed");
                }
                // Add a small success animation to the button
                const btnSaveEdit = document.getElementById('btnSaveEdit');
                const originalHtml = btnSaveEdit.innerHTML;
                btnSaveEdit.innerHTML = '<i class="bi bi-check2-circle"></i> Đã Lưu!';
                btnSaveEdit.style.background = '#198754';

                setTimeout(() => {
                    btnSaveEdit.innerHTML = originalHtml;
                    btnSaveEdit.style.background = '';
                    // Chuyển lại giao diện xem
                    btnCancelEdit.click();
                }, 1500);

            }catch(error){
                console.error(error)
            }
        });
    });
</script>
<script>
    document.addEventListener("DOMContentLoaded",async ()=>{
        try{
            const response = await fetch('/api/profile', {
                method: "GET",
                headers:{
                    "Authorization": "Bearer " + localStorage.getItem("accessToken")
                }
            });
            if(!response.ok){
                throw new Error("Cannot load information profile, status: " + response.status);
            }
            const data=await response.json();
            console.log("Profile data loaded:", data);
            document.getElementById("employeeName").value = data.fullName || "";
            document.getElementById("position").value = data.role || "";
            document.getElementById("gmail").value = data.email || "";
            document.getElementById("phone").value = data.phone || "";
            document.getElementById("currentPassword").value= data.password || "";
            if(data.avatar){
                console.log("Avatar URL from server:", data.avatar);
                const avatarEl = document.getElementById("avatarPreview");
                // Thêm onerror để fallback về avatar mặc định nếu URL không load được
                avatarEl.onerror = function() {
                    console.error("Failed to load avatar from URL:", data.avatar);
                    this.src = "https://ui-avatars.com/api/?name=" + encodeURIComponent(data.fullName || "User") + "&background=0D6EFD&color=fff&size=200";
                    this.onerror = null; // tránh loop vô hạn
                };
                avatarEl.src = data.avatar;
            }
        }catch (error){
            console.error("Profile load error:", error);
        }
    })
</script>
<script>
    const uploadAvatar=document.querySelector("#avatarUpload");
    uploadAvatar.addEventListener("change",async function(e){
        const file=e.target.files[0];
        if(!file){
            return;
        }
        const formData= new FormData();
        formData.append("file",file);
        try{
            const token = localStorage.getItem("accessToken");
            console.log("Upload avatar - Token exists:", !!token);
            const response= await fetch('/api/profile/avatar',{
                method:"POST",
                headers:{
                    "Authorization": "Bearer " + token
                },
                body: formData
            });
            console.log("Upload response status:", response.status);
            if(!response.ok){
                const errorText = await response.text();
                console.error("Upload failed:", response.status, errorText);
                return;
            }
            let imageUrl = await response.text();
            // Loại bỏ dấu ngoặc kép thừa nếu server trả về JSON string
            imageUrl = imageUrl.replace(/^"|"$/g, '').trim();
            console.log("Upload success - Avatar URL:", imageUrl);

            document.getElementById("avatarPreview").src = imageUrl;
        }catch (error){
            console.error("Upload avatar error:", error);
        }
    })

</script>

</html>
